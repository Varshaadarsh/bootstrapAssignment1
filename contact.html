        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html"><span class="logo-circle">V</span>arsha</a>

            </div>
        </nav>

    </header>
    <main>

        <section class="contact py-5">
            <div class="container">
                <h2 class="text-center mb-5">Stay on the line</h2>
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="card shadow p-4">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-control" placeholder="Enter your name" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" placeholder="Enter your email" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" placeholder="Enter your phone number">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Specialization</label>
                                    <input type="text" class="form-control" placeholder="Your specialization">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Message</label>
                                    <textarea class="form-control" rows="4" placeholder="Leave a message"></textarea>
                                </div>

                                <div class="text-center">
                                    <button type="submit" class="btn btn-primary px-4">Submit</button>
                                    <button type="reset" class="btn btn-outline-secondary px-4">Reset</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
